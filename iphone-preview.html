<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>はれる — iPhone Preview</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html,body{margin:0;height:100%;background:#e9e4dc;font-family:-apple-system,system-ui,"Hiragino Kaku Gothic ProN",sans-serif;color:#3a342c}
  body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:48px 20px 64px;box-sizing:border-box;min-height:100%;
    background:
      radial-gradient(circle at 20% 10%, #f6efe1 0%, transparent 50%),
      radial-gradient(circle at 80% 90%, #efe6d4 0%, transparent 55%),
      #e9e4dc;
  }
  .head{text-align:center;margin-bottom:32px;max-width:520px}
  .head .eyebrow{font-style:italic;color:#a07a4f;letter-spacing:.14em;text-transform:uppercase;font-size:11px;margin-bottom:8px}
  .head h1{font-family:"Hiragino Mincho ProN",serif;font-weight:600;font-size:26px;color:#1f2f4a;margin:0 0 10px;letter-spacing:.04em}
  .head p{font-size:13.5px;color:#6b6457;line-height:1.7;margin:0}

  .device{
    width:402px;height:874px;border-radius:54px;
    background:#0e0e10;
    padding:13px;box-sizing:border-box;
    box-shadow:
      0 50px 90px rgba(58,40,20,.28),
      0 0 0 1.5px #b9b3aa,
      0 0 0 2.5px #2a2722,
      inset 0 0 0 1px rgba(255,255,255,.06);
    position:relative;
  }
  /* side buttons */
  .device::before,.device::after{
    content:"";position:absolute;background:#262321;border-radius:2px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
  }
  .device::before{left:-3px;top:160px;width:3px;height:32px;border-radius:2px 0 0 2px}
  .device::after {left:-3px;top:210px;width:3px;height:56px;border-radius:2px 0 0 2px}
  .vol2{position:absolute;left:-3px;top:280px;width:3px;height:56px;background:#262321;border-radius:2px 0 0 2px}
  .pwr {position:absolute;right:-3px;top:220px;width:3px;height:84px;background:#262321;border-radius:0 2px 2px 0}

  .screen{
    width:100%;height:100%;border-radius:42px;overflow:hidden;
    background:#fdf6ec;position:relative;
  }
  /* dynamic island */
  .island{
    position:absolute;top:11px;left:50%;transform:translateX(-50%);
    width:126px;height:37px;border-radius:24px;background:#000;z-index:50;
    pointer-events:none;
  }
  /* status bar */
  .status{
    position:absolute;top:0;left:0;right:0;height:54px;z-index:40;pointer-events:none;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 32px 0 32px;
    font-family:-apple-system,system-ui,sans-serif;font-weight:600;font-size:16px;color:#1c1c1e;
  }
  .status .right{display:flex;gap:6px;align-items:center}
  .status svg{display:block}
  /* home indicator */
  .home{
    position:absolute;left:0;right:0;bottom:0;height:34px;z-index:60;
    display:flex;justify-content:center;align-items:flex-end;padding-bottom:8px;pointer-events:none;
  }
  .home .bar{width:139px;height:5px;border-radius:100px;background:rgba(0,0,0,.25)}

  iframe{
    border:0;display:block;width:100%;height:100%;
    background:#fdf6ec;
  }

  .controls{
    margin-top:28px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;
  }
  .controls a, .controls button{
    appearance:none;border:1px solid #d6cdbb;background:#fbf6ec;color:#3a342c;
    font:500 13px/1 -apple-system,system-ui,sans-serif;letter-spacing:.04em;
    padding:11px 18px;border-radius:999px;cursor:pointer;text-decoration:none;
    transition:transform .2s ease, box-shadow .2s ease, background .2s ease;
  }
  .controls a:hover, .controls button:hover{
    background:#fff;transform:translateY(-1px);box-shadow:0 8px 18px -8px rgba(90,58,34,.25);
  }
  .controls .primary{background:#1f3a5f;color:#fdf6ec;border-color:#1f3a5f}
  .controls .primary:hover{background:#2a4d7c}

  @media (max-width:520px){
    body{padding:24px 0 36px}
    .head{padding:0 20px}
    .device{transform:scale(.86);transform-origin:top center;margin-bottom:-110px}
  }
  @media (max-width:380px){
    .device{transform:scale(.78);margin-bottom:-180px}
  }
</style>
</head>
<body>

<div class="head">
  <div class="eyebrow">iPhone Preview</div>
  <h1>はれる コーポレートサイト</h1>
  <p>iPhone 15 Pro 相当（402×874）でスクロール確認できます。フレームの中をそのままタップ／スクロールしてください。</p>
</div>

<div class="device">
  <span class="vol2"></span>
  <span class="pwr"></span>
  <div class="screen">
    <div class="island"></div>
    <div class="status">
      <span>9:41</span>
      <span class="right">
        <!-- signal -->
        <svg width="18" height="11" viewBox="0 0 18 11" fill="currentColor"><rect x="0" y="7" width="3" height="4" rx=".5"/><rect x="5" y="5" width="3" height="6" rx=".5"/><rect x="10" y="2.5" width="3" height="8.5" rx=".5"/><rect x="15" y="0" width="3" height="11" rx=".5"/></svg>
        <!-- wifi -->
        <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 1.6c2.7 0 5.2 1 7 2.7l-1.4 1.4a8 8 0 0 0-11.2 0L1.5 4.3a10 10 0 0 1 7-2.7Zm0 3.6a6.4 6.4 0 0 1 4.5 1.9L11.6 8.5a4.4 4.4 0 0 0-6.2 0L4 7.1a6.4 6.4 0 0 1 4.5-1.9Zm0 3.6c.8 0 1.5.3 2 .9L8.5 11.7 6.5 9.7a2.8 2.8 0 0 1 2-.9Z"/></svg>
        <!-- battery -->
        <svg width="27" height="12" viewBox="0 0 27 12" fill="none"><rect x=".5" y=".5" width="22" height="11" rx="3" stroke="currentColor" opacity=".4"/><rect x="2" y="2" width="19" height="8" rx="1.8" fill="currentColor"/><rect x="24" y="4" width="2" height="4" rx="1" fill="currentColor" opacity=".4"/></svg>
      </span>
    </div>
    <iframe id="frame" src="index.html" title="はれる site mobile"></iframe>
    <div class="home"><div class="bar"></div></div>
  </div>
</div>

<div class="controls">
  <a class="primary" href="index.html" target="_blank" rel="noopener">新しいタブで開く</a>
  <button id="reload" type="button">リロード</button>
  <button id="top" type="button">先頭へ</button>
</div>

<script>
  document.getElementById('reload').addEventListener('click', () => {
    const f = document.getElementById('frame');
    f.src = f.src;
  });
  document.getElementById('top').addEventListener('click', () => {
    const f = document.getElementById('frame');
    try { f.contentWindow.scrollTo({top:0,behavior:'smooth'}); } catch(e) { f.src = f.src; }
  });
</script>
</body>
</html>
